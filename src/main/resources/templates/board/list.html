<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>お悩み掲示板</title>
    <link rel="stylesheet" th:href="@{/css/keijiban.css}">
</head>
<body>
<div class="wrapper">
    <h1>お悩み掲示板</h1>

    <!-- 投稿フォーム -->
    <form th:action="@{/boards}" method="post" class="confirmform">
        <label>名前：</label>
        <input type="text" name="name" th:value="${name}" required>

        <label>メール：</label>
        <input type="email" name="email" th:value="${email}" required>

        <label>件名：</label>
        <select name="subject" class="rajio" required>
            <option value="">選択してください</option>
            <option value="人生相談">人生相談</option>
            <option value="恋愛相談">恋愛相談</option>
            <option value="仕事の相談">仕事の相談</option>
            <option value="その他">その他</option>
        </select>

        <br>

        <label>メッセージ：</label>
        <textarea name="message" rows="5" required></textarea>

        <label>削除キー（忘れないでください）：</label>
        <input type="password" name="deleteKey">

        <div class="btn-submit">
            <input type="submit" value="投稿する" class="btn-small">
            <input type="reset" value="リセット" class="btn-small">
        </div>
    </form>

    <hr>

    <h2>投稿一覧</h2>

    <!-- 投稿一覧 -->
    <div th:each="b : ${boards}" class="board">
        <strong>名前：</strong><span th:text="${b.name}"></span><br>

        <strong>日時：</strong>
        <span th:text="${#temporals.format(b.createdAt, 'yyyy/MM/dd')}"></span><br>

        <strong>件名：</strong><span th:text="${b.subject}"></span><br>

        <strong>メッセージ：</strong><br>
        <p class="message" th:text="${b.message}"></p>

        <!-- 返信一覧 -->
        <div th:each="r : ${b.replies}" class="reply">
            <strong>返信者：</strong><span th:text="${r.name}"></span><br>

            <strong>メッセージ：</strong><br>
            <p th:text="${r.message}"></p>

            <strong>日時：</strong>
            <span th:text="${#temporals.format(r.createdAt, 'yyyy/MM/dd')}"></span><br>
        </div>

        <!-- ボタン -->
        <div class="btn-submit">
            <button type="button"
                    th:onclick="|toggleReplyForm(${b.id})|"
                    class="btn-small">
                返信する
            </button>

            <form th:action="@{/boards/delete}" method="post" style="display:inline;">
                <input type="hidden" name="id" th:value="${b.id}">
                <input type="submit" value="削除" class="btn-small">
            </form>
        </div>

        <!-- 返信フォーム -->
        <div th:id="'reply-form-' + ${b.id}" style="display:none; margin-top:10px;">
            <form th:action="@{/replies}" method="post" class="reply-form">
                <input type="hidden" name="boardId" th:value="${b.id}">

                名前：<br>
                <input type="text" name="name" required><br>

                メッセージ：<br>
                <textarea name="message" rows="3" cols="30" required></textarea>

                <input type="submit" value="返信する" class="btn-small">
            </form>
        </div>
    </div>

    <footer>
        <p>掲示板アプリ - Java研修</p>
    </footer>
</div>

<script>
    function toggleReplyForm(boardId) {
        const form = document.getElementById("reply-form-" + boardId);
        form.style.display = (form.style.display === "none") ? "block" : "none";
    }
</script>

</body>
</html>
