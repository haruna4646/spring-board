<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>投稿確認</title>
    <link rel="stylesheet" th:href="@{/css/keijiban.css}">
</head>

<body>
<div class="wrapper">

    <h1>投稿確認</h1>

    <div class="board">
        <p><strong>名前：</strong><span th:text="${boardForm.name}"></span></p>
        <p><strong>メール：</strong><span th:text="${boardForm.email}"></span></p>
        <p><strong>件名：</strong><span th:text="${boardForm.subject}"></span></p>
        <p><strong>本文：</strong></p>
        <p th:text="${boardForm.message}"></p>
    </div>

    <div class="btn">
        <form th:action="@{/boards/create}" method="post" style="display:inline;">
            <input type="hidden" name="name" th:value="${boardForm.name}">
            <input type="hidden" name="email" th:value="${boardForm.email}">
            <input type="hidden" name="subject" th:value="${boardForm.subject}">
            <input type="hidden" name="message" th:value="${boardForm.message}">
            <input type="hidden" name="deleteKey" th:value="${boardForm.deleteKey}">
            <input type="submit" value="投稿">
        </form>

        <form th:action="@{/boards}" method="get" style="display:inline;">
            <input type="submit" value="戻る">
        </form>
    </div>

</div>
</body>
</html>
