<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>お悩み掲示板</title>
    <link rel="stylesheet" th:href="@{/css/keijiban.css}">
</head>

<body>
<div class="wrapper">

    <h1>お悩み掲示板</h1>

    <!-- 🔍 検索 -->
    <div class="search-box">
        <form th:action="@{/boards/search}" method="get">
            キーワード：
            <input type="text" name="keyword" th:value="${searchForm.keyword}">
            <input type="submit" value="検索" class="btn1">
        </form>
    </div>

    <hr>

    <!-- 📝 投稿フォーム -->
    <form th:action="@{/boards/confirm}" method="post" th:object="${boardForm}">

	    <!-- 🔴 フォーム全体エラー -->
	    <div class="error-box" th:if="${#fields.hasErrors('*')}">
	        <ul>
	            <li th:each="e : ${#fields.errors('*')}" th:text="${e}"></li>
	        </ul>
	    </div>
		
		<div class="form-row">

		    <div class="field">
		        <label>名前</label>
		        <input type="text" th:field="*{name}">
		    </div>
		
		    <div class="field">
		        <label>メール</label>
		        <input type="email" th:field="*{email}">
		    </div>
		
		    <div class="field">
		        <label>件名</label>
		        <select th:field="*{subject}">
		            <option value="">選択してください</option>
		            <option value="人生相談">人生相談</option>
		            <option value="恋愛相談">恋愛相談</option>
		            <option value="仕事の相談">仕事の相談</option>
		            <option value="その他">その他</option>
		        </select>
		    </div>
		</div>

        本文：
        <textarea th:field="*{message}" rows="5"></textarea><br>

        削除キー：
        <input type="password" th:field="*{deleteKey}"><br>

        <input type="submit" value="確認">
    </form>

    <hr>

    <!-- 📄 投稿一覧 -->
    <div th:each="b : ${boards}" class="board">

        <strong>名前：</strong>
        <span th:text="${b.name}"></span><br>

        <strong>日時：</strong>
        <span th:text="${#temporals.format(b.createdAt,'yyyy/MM/dd HH:mm')}"></span><br>

        <strong>件名：</strong>
        <span th:text="${b.subject}"></span><br>

        <p th:text="${b.message}"></p>

        <hr>

        <!-- 💬 返信一覧 -->
        <div th:if="${b.replies != null}">
            <div th:each="r : ${b.replies}" class="reply">
                <strong>返信者：</strong>
                <span th:text="${r.name}"></span><br>

                <p th:text="${r.message}"></p>
            </div>
        </div>

		<div class="btn">
        <!-- 返信ボタン -->
        <button type="button" th:onclick="|toggle(${b.id})|">返信</button>

        <!-- 削除（安全版POST推奨） -->
        <form th:action="@{/boards/delete/confirm}" method="post" style="display:inline;">
            <input type="hidden" name="id" th:value="${b.id}">
            <input type="submit" value="削除">
        </form>
        </div>

        <!-- 返信フォーム -->
        <div th:id="'reply-' + ${b.id}" style="display:none;">

            <form class="reply-form" th:action="@{/replies}" method="post" th:object="${replyForm}">

                <input type="hidden" name="boardId" th:value="${b.id}">

                名前：
                <input type="text" th:field="*{name}"><br>

                返信：
                <textarea th:field="*{message}"></textarea><br>

                <input type="submit" value="返信">
            </form>

        </div>

    </div>

</div>

<script>
function toggle(id){
    const el = document.getElementById("reply-" + id);
    el.style.display = (el.style.display === "none" || el.style.display === "")
        ? "block"
        : "none";
}
</script>

</body>
</html>
