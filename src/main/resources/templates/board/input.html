<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>お悩み掲示板</title>
    <link rel="stylesheet" th:href="@{/css/keijiban.css}">
</head>
<body>
<div class="wrapper">
    <h1>お悩み掲示板</h1>

    <!-- 🔍 検索フォーム -->
    <form th:action="@{/boards/search}" method="get">
        キーワード：
        <input type="text" name="keyword" th:value="${keyword}">
        メール：
        <input type="text" name="email" th:value="${email}">
        <input type="submit" value="検索">
    </form>

    <hr>

    <!-- 📝 投稿入力 -->
    <form th:action="@{/boards/confirm}" method="post" th:object="${boardForm}">
        <div th:if="${#fields.hasErrors('*')}">
            <p th:each="e : ${#fields.errors('*')}" th:text="${e}"></p>
        </div>

        名前：<input type="text" th:field="*{name}"><br>
        メール：<input type="email" th:field="*{email}"><br>

        件名：
        <select th:field="*{subject}">
            <option value="">選択してください</option>
            <option value="人生相談">人生相談</option>
            <option value="恋愛相談">恋愛相談</option>
            <option value="仕事の相談">仕事の相談</option>
            <option value="その他">その他</option>
        </select><br>

        本文：<br>
        <textarea th:field="*{message}" rows="5"></textarea><br>

        削除キー：
        <input type="password" th:field="*{deleteKey}"><br>

        <input type="submit" value="確認">
    </form>

    <hr>

    <!-- 📄 投稿一覧 -->
    <div th:each="b : ${boards}" class="board">
        <strong>名前：</strong><span th:text="${b.name}"></span><br>
        <strong>日時：</strong>
        <span th:text="${#temporals.format(b.createdAt,'yyyy/MM/dd')}"></span><br>
        <strong>件名：</strong><span th:text="${b.subject}"></span><br>
        <p th:text="${b.message}"></p>

        <!-- 💬 返信一覧 -->
        <div th:each="r : ${b.replies}" class="reply">
            <strong>返信者：</strong><span th:text="${r.name}"></span><br>
            <p th:text="${r.message}"></p>
        </div>

        <!-- 返信ボタン -->
        <button type="button" th:onclick="|toggle(${b.id})|">返信</button>

        <!-- 削除 -->
        <a th:href="@{/boards/delete/{id}(id=${b.id})}">削除</a>

        <!-- 返信フォーム -->
        <div th:id="'reply-' + ${b.id}" style="display:none;">
            <form th:action="@{/replies}" method="post" th:object="${replyForm}">
                <input type="hidden" name="boardId" th:value="${b.id}">
                名前：<input type="text" th:field="*{name}"><br>
                <textarea th:field="*{message}"></textarea><br>
                <input type="submit" value="返信">
            </form>
        </div>
    </div>
</div>

<script>
function toggle(id){
    const el = document.getElementById("reply-" + id);
    el.style.display = el.style.display === "none" ? "block" : "none";
}
</script>
</body>
</html>
